    // --- NUEVO 6: CONCEPTO FRAGMENTADO ---
    let fragObj = { real: "", arr: [], sel: [] };
    function startFragmentado() {
      historialRespuestas = []; juegoActual = 'fragmentado'; ronda = 0; puntajeJuego = 0;
      bancoJuego = mezclarArray(dbGlosario.filter(g => g.resumen.length > 20 && g.resumen.length < 100)).slice(0, 3);
      nextFragmentado();
    }
    function nextFragmentado() {
      if(ronda >= bancoJuego.length) { puntajeJuego = Math.round((puntajeJuego/3)*10); return renderFinalResult(); }
      let c = bancoJuego[ronda];
      fragObj.real = c.resumen;
      fragObj.arr = mezclarArray(c.resumen.split(' '));
      fragObj.sel = []; renderFragmentado();
    }
    function renderFragmentado() {
      let fHtml = fragObj.arr.map((w, i) => {
        let isUsed = fragObj.sel.includes(i);
        return `<div class="frag-word ${isUsed?'used':''}" ${isUsed?'':`onclick="clickFrag(${i})"`}>${w}</div>`;
      }).join('');
      let currentSentence = fragObj.sel.map(idx => fragObj.arr[idx]).join(' ');
      elArcadeView.innerHTML = renderDashboardHTML() + `<button class="game-back-menu" onclick="renderArcadeMenu()">← Volver</button><div class="game-active-header"><span>🧩 Fragmentado</span><span>Frase ${ronda + 1} / 3</span></div><h3 style="color:#9b59b6; margin-bottom:10px;">${bancoJuego[ronda].titulo}</h3><div style="min-height:50px; font-size:1.1rem; font-style:italic; margin:20px 0;">${currentSentence}</div><div class="frag-container">${fHtml}</div><button class="game-back-menu" onclick="fragObj.sel=[]; renderFragmentado()">↻ Limpiar</button>`;
      
      if(fragObj.sel.length === fragObj.arr.length && fragObj.arr.length > 0) {
        if(currentSentence === fragObj.real) { 
            puntajeJuego++; 
            historialRespuestas.push({pre: bancoJuego[ronda].titulo, res: "Correcto", cor: fragObj.real, exp: "Frase ensamblada perfectamente."});
            ronda++; alert("¡Correcto!"); nextFragmentado(); 
        } else { 
            historialRespuestas.push({pre: bancoJuego[ronda].titulo, res: "Incorrecto", cor: fragObj.real, exp: "El orden preciso importa."});
            alert("Orden incorrecto. Te mostraremos la correcta en los resultados."); 
            ronda++; nextFragmentado();
        }
      }
    }
    function clickFrag(idx) { fragObj.sel.push(idx); renderFragmentado(); }

    // --- NUEVO 7: BOMBARDEO CONTRARRELOJ ---
    let bombObj = { time: 60, score: 0, current: null };
    function startBombardeo() {
      historialRespuestas = []; juegoActual = 'bombardeo'; puntajeJuego = 0; bombObj.time = 60; bombObj.score = 0;
      if(timerGlobal) clearInterval(timerGlobal);
      timerGlobal = setInterval(tickBombardeo, 1000); nextBombardeo();
    }
    function tickBombardeo() {
      bombObj.time--;
      let barra = document.getElementById('bomb-bar'); if(barra) barra.style.width = (bombObj.time/60)*100 + '%';
      if(bombObj.time <= 0) { clearInterval(timerGlobal); puntajeJuego = bombObj.score >= 10 ? 10 : bombObj.score; renderFinalResult(); }
    }
    function nextBombardeo() {
      let g = dbGlosario[Math.floor(Math.random()*dbGlosario.length)];
      bombObj.current = { q: g.resumen, c: g.titulo, ops: obtenerOpcionesCuatro(g.titulo, listaTitulosGlobal) };
      renderBombardeo();
    }
    function renderBombardeo() {
      let botones = bombObj.current.ops.map(o => `<button class="option-btn" style="padding:10px; font-size:0.9rem;" onclick="evaluarBombardeo('${escapeString(o)}')">${o}</button>`).join('');
      elArcadeView.innerHTML = renderDashboardHTML() + `<button class="game-back-menu" onclick="renderArcadeMenu()">← Salir</button><div class="game-active-header"><span>⏱️ Bombardeo</span><span>Score: ${bombObj.score}</span></div><div class="timer-bar"><div class="timer-fill" id="bomb-bar" style="width:${(bombObj.time/60)*100}%"></div></div><div class="game-text-question" style="font-size:1rem; padding:15px;">${bombObj.current.q}</div><div class="options-stack">${botones}</div>`;
    }
    function evaluarBombardeo(sel) { 
        if(sel === bombObj.current.c) bombObj.score++; 
        historialRespuestas.push({pre: bombObj.current.q, res: sel, cor: bombObj.current.c, exp: sel === bombObj.current.c ? "¡Correcto!" : "Concepto erróneo."});
        nextBombardeo(); 
    }

    // --- WORDLE Y SOPA EXISTENTES ---
    let wObj = { palabra: '', intentos: 0, max: 6, historial: [] };
    function startWordle() {
      historialRespuestas = []; juegoActual = 'wordle'; puntajeJuego = 0; let cand = dbGlosario.filter(g => g.titulo.length >= 4 && g.titulo.length <= 7 && !g.titulo.includes(' '));
      if(!cand.length) cand = [{titulo: "TERAPIA"}]; wObj.palabra = normalizarP(cand[Math.floor(Math.random() * cand.length)].titulo).toUpperCase();
      wObj.intentos = 0; wObj.historial = []; renderWordleBoard();
    }
    function renderWordleBoard() {
      let histHtml = wObj.historial.map(h => `<div style="display:flex;gap:5px;justify-content:center;margin-bottom:5px;">${h.split('').map((letra, i) => { let color = '#bdc3c7'; if(wObj.palabra[i] === letra) color = '#2ecc71'; else if(wObj.palabra.includes(letra)) color = '#f1c40f'; return `<span style="width:35px;height:35px;display:flex;align-items:center;justify-content:center;background:${color};color:white;font-weight:bold;border-radius:4px;">${letra}</span>`}).join('')}</div>`).join('');
      elArcadeView.innerHTML = renderDashboardHTML() + `<button class="game-back-menu" onclick="renderArcadeMenu()">← Volver</button><div class="game-active-header"><span>🟩 Wordle Clínico</span><span>Intentos: ${wObj.intentos}/6</span></div><p>Palabra de <b>${wObj.palabra.length} letras</b>.</p><div style="margin:20px 0;">${histHtml}</div><input type="text" id="w-input" maxlength="${wObj.palabra.length}" style="text-transform:uppercase;padding:10px;font-size:1.2rem;width:200px;text-align:center;"><br><button class="game-play-btn" onclick="checkWordle()">Comprobar</button>`;
    }
    function checkWordle() {
      let el = document.getElementById('w-input');
      if(!el) return;
      let intento = normalizarP(el.value).toUpperCase();
      if(intento.length !== wObj.palabra.length) return alert("Debe tener " + wObj.palabra.length + " letras.");
      wObj.historial.push(intento); wObj.intentos++;
      
      if(intento === wObj.palabra) { 
          puntajeJuego = 10; 
          historialRespuestas.push({pre: "Wordle ("+wObj.palabra.length+" letras)", res: intento, cor: wObj.palabra, exp: "¡Adivinaste!"});
          return renderFinalResult(); 
      }
      if(wObj.intentos >= wObj.max) {
          historialRespuestas.push({pre: "Wordle ("+wObj.palabra.length+" letras)", res: intento, cor: wObj.palabra, exp: "Te quedaste sin intentos."});
          return renderFinalResult();
      }
      renderWordleBoard();
    }

    let slObj = { grid: [], palabras: [], encontradas: [], size: 10, seleccionadas: [] };
    function startSopa() {
      historialRespuestas = []; juegoActual = 'sopa'; puntajeJuego = 0; let cand = mezclarArray(dbGlosario.filter(g => g.titulo.length >= 4 && g.titulo.length <= 8 && !g.titulo.includes(' '))).slice(0, 3);
      if(cand.length === 0) cand = [{titulo: "AYUDA"}, {titulo: "AMOR"}, {titulo: "PAZ"}];
      slObj.palabras = cand.map(c => normalizarP(c.titulo).toUpperCase()); slObj.encontradas = []; slObj.seleccionadas = []; slObj.grid = Array(10).fill(null).map(() => Array(10).fill(''));
      slObj.palabras.forEach(palabra => {
        let placed = false; let safety = 0; while(!placed && safety < 100) {
          safety++; let isH = Math.random()>0.5; let r = Math.floor(Math.random()*10); let c = Math.floor(Math.random()*10);
          if(isH && c+palabra.length<=10) { let can=true; for(let i=0;i<palabra.length;i++) if(slObj.grid[r][c+i]!=='' && slObj.grid[r][c+i]!==palabra[i]) can=false; if(can) { for(let i=0;i<palabra.length;i++) slObj.grid[r][c+i]=palabra[i]; placed=true; } }
          else if(!isH && r+palabra.length<=10) { let can=true; for(let i=0;i<palabra.length;i++) if(slObj.grid[r+i][c]!=='' && slObj.grid[r+i][c]!==palabra[i]) can=false; if(can) { for(let i=0;i<palabra.length;i++) slObj.grid[r+i][c]=palabra[i]; placed=true; } }
        }
      });
      let letT = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
      for(let r=0;r<10;r++) for(let c=0;c<10;c++) if(slObj.grid[r][c]==='') slObj.grid[r][c]=letT.charAt(Math.floor(Math.random()*letT.length));
      renderSopa();
    }
    function renderSopa() {
      if(slObj.encontradas.length === slObj.palabras.length) { puntajeJuego = 10; return renderFinalResult(); }
      let hG = '<div style="display:grid;grid-template-columns:repeat(10,30px);gap:3px;justify-content:center;margin:20px auto;">';
      for(let r=0;r<10;r++) for(let c=0;c<10;c++) { let isS = slObj.seleccionadas.some(s=>s.r===r&&s.c===c); hG += `<div onclick="clickSopa(${r},${c})" style="width:30px;height:30px;display:flex;align-items:center;justify-content:center;background:${isS?'#9b59b6':'#fff'};color:${isS?'white':'black'};border:1px solid #ccc;cursor:pointer;font-weight:bold;border-radius:4px;">${slObj.grid[r][c]}</div>`; }
      hG += '</div>';
      
      let btnTerminar = modoMaraton ? `<button class="game-play-btn" style="background:#e74c3c; margin-left:10px;" onclick="forceEndSopa()">Rendirse</button>` : '';
      elArcadeView.innerHTML = renderDashboardHTML() + `<button class="game-back-menu" onclick="renderArcadeMenu()">← Volver</button><div class="game-active-header"><span>🔍 Sopa</span><span>${slObj.encontradas.length} / ${slObj.palabras.length}</span></div><p style="font-weight:bold;color:#9b59b6;">${slObj.palabras.map(p => slObj.encontradas.includes(p)?`<s>${p}</s>`:p).join(' | ')}</p>${hG}<button class="game-play-btn" onclick="checkSopa()">Comprobar</button>${btnTerminar}`;
    }
    function clickSopa(r, c) { let idx = slObj.seleccionadas.findIndex(s=>s.r===r&&s.c===c); if(idx>=0) slObj.seleccionadas.splice(idx,1); else slObj.seleccionadas.push({r,c}); renderSopa(); }
    function checkSopa() {
      let wf = slObj.seleccionadas.map(s => slObj.grid[s.r][s.c]).join(''); let wfr = wf.split('').reverse().join('');
      if((slObj.palabras.includes(wf)&&!slObj.encontradas.includes(wf))) slObj.encontradas.push(wf);
      else if((slObj.palabras.includes(wfr)&&!slObj.encontradas.includes(wfr))) slObj.encontradas.push(wfr);
      slObj.seleccionadas = []; 
      
      if(slObj.encontradas.length === slObj.palabras.length) {
          historialRespuestas.push({pre: "Sopa de Letras", res: slObj.encontradas.join(', '), cor: slObj.palabras.join(', '), exp: "Términos encontrados exitosamente."});
      }
      renderSopa();
    }
    function forceEndSopa() {
      historialRespuestas.push({pre: "Sopa de Letras", res: slObj.encontradas.join(', ') || "Ninguna", cor: slObj.palabras.join(', '), exp: "Términos que faltaron encontrar."});
      renderFinalResult();
    }

    // --- NUEVO: INVASORES TERAPÉUTICOS (Space Invaders) ---
    let invState = {};
    const bloques = ["Juicio", "Prejuicio", "Soberbia", "Simpatía", "Censura", "Crítica"];
    
    function startInvasores() {
      historialRespuestas = []; juegoActual = 'invasores'; puntajeJuego = 0;
      invState = { 
        playing: true, score: 0, playerX: 250, playerW: 80, playerH: 20, 
        bullets: [], enemies: [], lastEnemy: 0, keys: {}, lives: 3, speedMod: 1
      };
      
      elArcadeView.innerHTML = renderDashboardHTML() + `
        <button class="game-back-menu" onclick="stopInvasores()">← Salir</button>
        <div class="game-active-header"><span>🚀 Invasores Terapéuticos</span><span id="inv-score">Puntos: 0 | Vidas: 3</span></div>
        <p style="margin-bottom:10px;font-size:0.9rem;">Destruye los bloqueos disparando 'Empatía'. Evita que lleguen a la base.</p>
        <canvas id="space-canvas" width="600" height="350"></canvas>
        <div class="space-controls">
          <button class="btn-space" onmousedown="invState.keys.ArrowLeft=true" onmouseup="invState.keys.ArrowLeft=false" ontouchstart="invState.keys.ArrowLeft=true" ontouchend="invState.keys.ArrowLeft=false">⬅️ Izq</button>
          <button class="btn-space btn-space-shoot" onmousedown="shootInv()" ontouchstart="shootInv()">⚡ Disparar Empatía</button>
          <button class="btn-space" onmousedown="invState.keys.ArrowRight=true" onmouseup="invState.keys.ArrowRight=false" ontouchstart="invState.keys.ArrowRight=true" ontouchend="invState.keys.ArrowRight=false">Der ➡️</button>
        </div>
      `;

      document.addEventListener('keydown', invKeyDown);
      document.addEventListener('keyup', invKeyUp);
      loopInvasores = requestAnimationFrame(updateInvasores);
    }
    
    function invKeyDown(e) { invState.keys[e.code] = true; if(e.code === 'Space') shootInv(); }
    function invKeyUp(e) { invState.keys[e.code] = false; }
    function shootInv() {
        if(!invState.playing) return;
        invState.bullets.push({ x: invState.playerX + invState.playerW/2 - 2, y: 320, w: 4, h: 10 });
    }
    function stopInvasores() {
        invState.playing = false;
        document.removeEventListener('keydown', invKeyDown);
        document.removeEventListener('keyup', invKeyUp);
        cancelAnimationFrame(loopInvasores);
        renderArcadeMenu();
    }

    function updateInvasores() {
        if(!invState.playing) return;
        let canvas = document.getElementById('space-canvas');
        if(!canvas) return;
        let ctx = canvas.getContext('2d');
        
        // Movimiento Jugador
        if(invState.keys['ArrowLeft'] && invState.playerX > 0) invState.playerX -= 5;
        if(invState.keys['ArrowRight'] && invState.playerX < canvas.width - invState.playerW) invState.playerX += 5;

        // Generar Enemigos
        invState.lastEnemy++;
        if(invState.lastEnemy > (80 / invState.speedMod)) {
            invState.enemies.push({
                x: Math.random() * (canvas.width - 60), y: -20, w: 60, h: 20, 
                text: bloques[Math.floor(Math.random() * bloques.length)]
            });
            invState.lastEnemy = 0;
            invState.speedMod += 0.05; // Aumentar dificultad
        }

        // Limpiar Canvas
        ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Dibujar Jugador
        ctx.fillStyle = '#2ecc71';
        ctx.fillRect(invState.playerX, 330, invState.playerW, invState.playerH);
        ctx.fillStyle = 'white'; ctx.font = '12px Arial'; ctx.textAlign = 'center';
        ctx.fillText("Counselor", invState.playerX + invState.playerW/2, 345);

        // Actualizar y dibujar balas
        ctx.fillStyle = '#f1c40f';
        for(let i = invState.bullets.length - 1; i >= 0; i--) {
            let b = invState.bullets[i];
            b.y -= 7;
            ctx.fillRect(b.x, b.y, b.w, b.h);
            if(b.y < 0) invState.bullets.splice(i, 1);
        }

        // Actualizar y dibujar enemigos
        for(let i = invState.enemies.length - 1; i >= 0; i--) {
            let e = invState.enemies[i];
            e.y += 1.5 * invState.speedMod;
            
            // Colisión con balas
            let hit = false;
            for(let j = invState.bullets.length - 1; j >= 0; j--) {
                let b = invState.bullets[j];
                if(b.x < e.x + e.w && b.x + b.w > e.x && b.y < e.y + e.h && b.y + b.h > e.y) {
                    invState.bullets.splice(j, 1);
                    invState.enemies.splice(i, 1);
                    invState.score++;
                    hit = true; break;
                }
            }
            if(hit) continue;

            // Enemigo llega abajo
            if(e.y > canvas.height) {
                invState.lives--;
                invState.enemies.splice(i, 1);
                if(invState.lives <= 0) return endInvasores();
            } else {
                ctx.fillStyle = '#e74c3c';
                ctx.fillRect(e.x, e.y, e.w, e.h);
                ctx.fillStyle = 'white'; ctx.font = '10px Arial';
                ctx.fillText(e.text, e.x + e.w/2, e.y + 14);
            }
        }
        
        document.getElementById('inv-score').innerText = `Puntos: ${invState.score} | Vidas: ${invState.lives}`;
        
        if(invState.score >= 10) return endInvasores(); // Gana a los 10 puntos para mantener coherencia
        
        loopInvasores = requestAnimationFrame(updateInvasores);
    }
    
    function endInvasores() {
        invState.playing = false;
        document.removeEventListener('keydown', invKeyDown);
        document.removeEventListener('keyup', invKeyUp);
        puntajeJuego = invState.score > 10 ? 10 : invState.score;
        historialRespuestas.push({pre: "Destruir Bloqueos", res: puntajeJuego + " impactos", cor: "10 impactos", exp: "Disparaste Empatía para frenar juicios y barreras."});
        renderFinalResult();
    }

    // --- RESULTADOS Y MARATÓN ---
    function renderFinalResult() {
      let mensaje = ""; let consejo = ""; let scoreMaximo = 10;
      if (puntajeJuego >= 9) { mensaje = "¡Perfección Absoluta! 🏆"; consejo = "Tienes un dominio increíble e impecable del glosario."; } 
      else if (puntajeJuego >= 6) { mensaje = "¡Excelente Trabajo! 🌟"; consejo = "Estás muy bien preparado/a y demuestras gran fluidez conceptual."; } 
      else if (puntajeJuego >= 4) { mensaje = "¡Buen Intento! 👍"; consejo = "Vas por muy buen camino. Repasa de manera focalizada."; } 
      else { mensaje = "¡A Seguir Estudiando! 📚"; consejo = "Utiliza el panel central para profundizar cada concepto."; }
      
      // Sumar al Global Permanente
      puntajeGlobalTotal += puntajeJuego;

      let htmlRespuestas = `<div style="text-align:left; margin-top: 20px; max-height: 250px; overflow-y: auto; padding: 15px; background: white; border-radius: 8px; border: 1px solid #ddd;">
        <h3 style="color:#9b59b6; margin-bottom:15px; font-size:1.1rem;">📝 Resumen de Respuestas:</h3>
        ${historialRespuestas.length > 0 ? historialRespuestas.map(r => `
            <div style="margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px dashed #eee; font-size: 0.9rem;">
                <strong>Pregunta/Contexto:</strong> <span style="color:#34495e;">${r.pre}</span> <br>
                <strong>Tú:</strong> <span style="color:${r.res === r.cor || ['Sí', 'Descubierta', 'Correcto', 'Emparejado', 'Empatía'].includes(r.res) || typeof r.res === 'string' && r.res.includes('impactos') ? '#2ecc71' : (r.res===r.cor ? '#2ecc71' : '#e74c3c')}">${r.res}</span> <br>
                <strong>Correcto/Esperado:</strong> <span style="color:#2ecc71;">${r.cor}</span> <br>
                <em style="font-size: 0.85rem; color: #7f8c8d; display:block; margin-top:4px;">💡 ${r.exp}</em>
            </div>
        `).join('') : '<p style="color:#7f8c8d; font-style:italic;">No se registraron detalles específicos.</p>'}
      </div>`;

      let btnAction = `<button class="game-play-btn" onclick="renderArcadeMenu()">↻ Volver al Menú Arcade</button>`;
      
      if(modoMaraton) {
          puntajeMaraton += puntajeJuego;
          maxPuntajeMaraton += scoreMaximo;
          indiceMaraton++;
          if(indiceMaraton < MARATON_JUEGOS.length) {
              btnAction = `<button class="game-play-btn" style="background:#2ecc71; width:100%;" onclick="MARATON_JUEGOS[${indiceMaraton}]()">Siguiente Juego ➔</button>
                           <div style="margin-top:15px; font-weight:bold; color:#34495e; font-size:0.95rem;">Progreso: Juego ${indiceMaraton} de 15 | Score Acumulado: ${puntajeMaraton}</div>
                           <button class="game-back-menu" style="margin-top:10px;" onclick="renderArcadeMenu()">Salir de la Maratón</button>`;
          } else {
              btnAction = `<button class="game-play-btn" style="background:#f1c40f; color:#333; width:100%;" onclick="finalizarMaraton()">🏆 Ver Resultado Final de Maratón</button>`;
          }
      }

      elArcadeView.innerHTML = renderDashboardHTML() + `<div class="result-box" style="max-width: 700px;"><h2>${mensaje}</h2><p>Tu puntaje en este juego es:</p><div class="result-score">${puntajeJuego} / ${scoreMaximo}</div><p style="font-style:italic;margin-bottom:15px;color:var(--text-main);">${consejo}</p>${htmlRespuestas}<br>${btnAction}</div>`;
    }

    function finalizarMaraton() {
        modoMaraton = false;
        elArcadeView.innerHTML = renderDashboardHTML() + `<div class="result-box" style="max-width: 700px;">
            <h2>🏆 ¡Maratón Completada! 🏆</h2>
            <div class="result-score">${puntajeMaraton} / ${maxPuntajeMaraton}</div>
            <p>¡Increíble esfuerzo! Has recorrido las 15 modalidades del Arcade.</p>
            <button class="game-play-btn" style="margin-top:20px;" onclick="renderArcadeMenu()">↻ Volver al Menú Arcade</button>
        </div>`;
    }

    selectCategory('all');

  </script>
</body>
</html>
