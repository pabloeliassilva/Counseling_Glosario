nde de inmediato.<br><br><br><br><br><br>Acompañarla a reconocer y aceptar su necesidad humana de seguridad, acortando la brecha entre su autoconcepto ideal y su vivencia real.<br><br><br><br><br><br>Un hombre que se autodefine como pacífico pero expresa su hostilidad mediante ironías hirientes constantes y dolores estomacales.","categoriaId":5},{"id":29,"tipo":"🌞 Concepto","titulo":"Insight","resumen":"Comprensión profunda y repentina de una situación o conflicto interno.","desarrollo":"Similar al \"darse cuenta\", pero a menudo asociado a una reestructuración cognitiva donde \"caen las fichas\" sobre la relación causal entre eventos del pasado y el comportamiento presente. En counseling, el insight no se fuerza; emerge orgánicamente a través de la exploración guiada y facilita una sensación de liberación y claridad conceptual.\n\n\nBibliografía: Corey, G. (2013). Teoría y práctica de la terapia grupal e individual. Cengage Learning.","aplicacion":"Tras varias sesiones indagando en su autoexigencia, el consultante comprende de golpe el origen de su conducta.\n\n\nEl consultante comprende de forma profunda: 'Exijo la perfección en todo lo que hago porque siento que si fallo, nadie me va a querer'.\n\n\nEntender de manera repentina que su excesiva hostilidad hacia sus compañeros de trabajo es una defensa para ocultar su propia inseguridad.","desarrolloHtml":"Similar al \"darse cuenta\", pero a menudo asociado a una reestructuración cognitiva donde \"caen las fichas\" sobre la relación causal entre eventos del pasado y el comportamiento presente. En counseling, el insight no se fuerza; emerge orgánicamente a través de la exploración guiada y facilita una sensación de liberación y claridad conceptual.<br><br><br><br><br><br>Bibliografía: Corey, G. (2013). Teoría y práctica de la terapia grupal e individual. Cengage Learning.","aplicacionHtml":"Tras varias sesiones indagando en su autoexigencia, el consultante comprende de golpe el origen de su conducta.<br><br><br><br><br><br>El consultante comprende de forma profunda: 'Exijo la perfección en todo lo que hago porque siento que si fallo, nadie me va a querer'.<br><br><br><br><br><br>Entender de manera repentina que su excesiva hostilidad hacia sus compañeros de trabajo es una defensa para ocultar su propia inseguridad.","categoriaId":4},{"id":35,"tipo":"🌞 Concepto","titulo":"Inteligencia Emocional","resumen":"Capacidad para identificar, gestionar y expresar las propias emociones.","desarrollo":"Involucra cinco componentes clave: autoconciencia emocional, autorregulación, automotivación, empatía y habilidades sociales. El trabajo del counselor suele ser un entrenamiento directo o indirecto en inteligencia emocional, permitiendo al consultante no ser secuestrado por sus emociones negativas y utilizarlas como datos válidos para la acción adaptativa.\n\n\nBibliografía: Goleman, D. (1995). Inteligencia Emocional. Editorial Kairós.","aplicacion":"Un consultante que tiende a reaccionar con explosiones de ira desproporcionadas ante comentarios de sus compañeros.\n\n\nAprender a detectar las señales corporales del enojo (calor en el pecho, mandíbula rígida) para tomar una pausa antes de responder.\n\n\nDesarrollar la automotivación para continuar con el desarrollo de un proyecto personal a pesar de los contratiempos iniciales.","desarrolloHtml":"Involucra cinco componentes clave: autoconciencia emocional, autorregulación, automotivación, empatía y habilidades sociales. El trabajo del counselor suele ser un entrenamiento directo o indirecto en inteligencia emocional, permitiendo al consultante no ser secuestrado por sus emociones negativas y utilizarlas como datos válidos para la acción adaptativa.<br><br><br><br><br><br>Bibliografía: Goleman, D. (1995). Inteligencia Emocional. Editorial Kairós.","aplicacionHtml":"Un consultante que tiende a reaccionar con explosiones de ira desproporcionadas ante comentarios de sus compañeros.<br><br><br><br><br><br>Aprender a detectar las señales corporales del enojo (calor en el pecho, mandíbula rígida) para tomar una pausa antes de responder.<br><br><br><br><br><br>Desarrollar la automotivación para continuar con el desarrollo de un proyecto personal a pesar de los contratiempos iniciales.","categoriaId":4},{"id":22,"tipo":"🌞 Concepto","titulo":"Intervención en Crisis","resumen":"Asistencia breve y directa para estabilizar a una persona en una emergencia emocional.","desarrollo":"A diferencia del proceso tradicional de counseling, la intervención en crisis es directiva, temporal y centrada exclusivamente en el evento precipitante (duelo repentino, trauma, desastre). Su objetivo principal no es el crecimiento personal profundo a largo plazo, sino prevenir el daño psicológico severo, restaurar el equilibrio cognitivo/emocional y recuperar la funcionalidad inmediata.\n\n\nBibliografía: Slaikeu, K. A. (1996). Intervención en crisis: Manual para práctica e investigación. Manual Moderno.","aplicacion":"Atención de emergencia a una persona que acaba de sufrir un accidente de tránsito menor pero está en shock afectivo.\n\n\nAplicar directividad temporal: estabilizar su respiración, asegurar que esté en un lugar físico a salvo y ayudarle a llamar a un familiar.\n\n\nFocalizarse exclusivamente en resolver la urgencia inmediata y reestablecer su equilibrio emocional, posponiendo reflexiones profundas.","desarrolloHtml":"A diferencia del proceso tradicional de counseling, la intervención en crisis es directiva, temporal y centrada exclusivamente en el evento precipitante (duelo repentino, trauma, desastre). Su objetivo principal no es el crecimiento personal profundo a largo plazo, sino prevenir el daño psicológico severo, restaurar el equilibrio cognitivo/emocional y recuperar la funcionalidad inmediata.<br><br><br><br><br><br>Bibliografía: Slaikeu, K. A. (1996). Intervención en crisis: Manual para práctica e investigación. Manual Moderno.","aplicacionHtml":"Atención de emergencia a una persona que acaba de sufrir un accidente de tránsito menor pero está en shock afectivo.<br><br><br><br><br><br>Aplicar directividad temporal: estabilizar su respiración, asegurar que esté en un lugar físico a salvo y ayudarle a llamar a un familiar.<br><br><br><br><br><br>Focalizarse exclusivamente en resolver la urgencia inmediata y reestablecer su equilibrio emocional, posponiendo reflexiones profundas.","categoriaId":7},{"id":48,"tipo":"🌞 Concepto","titulo":"Marco de Referencia","resumen":"El mundo interno, percepciones y significados desde los cuales el consultante ve la vida.","desarrollo":"Cada individuo percibe la realidad a través del filtro de su historia, cultura, biología y creencias. No hay dos marcos de referencia idénticos. La empatía requiere abandonar temporalmente el propio marco de referencia para ingresar sin prejuicios al del consultante, entendiendo que su conducta \"tiene sentido\" desde su visión del mundo, aunque desde fuera parezca irracional.\n\n\nBibliografía: Rogers, C. (1951). Psicoterapia centrada en el cliente. Ediciones Paidós.","aplicacion":"Trabajar con un consultante que proviene de una cultura rural con costumbres y creencias radicalmente distintas a las del counselor.\n\n\nComprender que su negativa a realizar ciertas acciones laborales se basa en sus profundos valores comunitarios, sin tildarlo de 'pasivo'.\n\n\nEscuchar los temores económicos de una persona entendiendo su historia de escasez en la infancia, dejando de lado la lógica del profesional.","desarrolloHtml":"Cada individuo percibe la realidad a través del filtro de su historia, cultura, biología y creencias. No hay dos marcos de referencia idénticos. La empatía requiere abandonar temporalmente el propio marco de referencia para ingresar sin prejuicios al del consultante, entendiendo que su conducta \"tiene sentido\" desde su visión del mundo, aunque desde fuera parezca irracional.<br><br><br><br><br><br>Bibliografía: Rogers, C. (1951). Psicoterapia centrada en el cliente. Ediciones Paidós.","aplicacionHtml":"Trabajar con un consultante que proviene de una cultura rural con costumbres y creencias radicalmente distintas a las del counselor.<br><br><br><br><br><br>Comprender que su negativa a realizar ciertas acciones laborales se basa en sus profundos valores comunitarios, sin tildarlo de 'pasivo'.<br><br><br><br><br><br>Escuchar los temores económicos de una persona entendiendo su historia de escasez en la infancia, dejando de lado la lógica del profesional.","categoriaId":5},{"id":33,"tipo":"🌞 Concepto","titulo":"Orientación Vocacional","resumen":"Proceso de ayuda para facilitar la elección de una carrera o camino laboral.","desarrollo":"No se limita a la aplicación de tests psicométricos. Es un proceso de counseling profundo donde se exploran intereses, aptitudes, valores, historia familiar, mercado laboral y mandatos sociales. Se acompaña al consultante para que proyecte su identidad vocacional y ocupacional de manera autónoma, integrando quién es con lo que desea \"hacer\" en el mundo.\n\n\nBibliografía: Super, D. E. (1957). The psychology of careers. Harper & Row.","aplicacion":"Un joven finaliza la escuela secundaria y se encuentra sumido en una total confusión respecto a qué carrera elegir.\n\n\nAnalizar juntos el árbol genealógico laboral para desactivar mandatos familiares inconscientes ('en esta familia todos son médicos').\n\n\nRealizar ejercicios de fantasía guiada sobre un día de trabajo ideal para conectar sus intereses reales con las opciones académicas.","desarrolloHtml":"No se limita a la aplicación de tests psicométricos. Es un proceso de counseling profundo donde se exploran intereses, aptitudes, valores, historia familiar, mercado laboral y mandatos sociales. Se acompaña al consultante para que proyecte su identidad vocacional y ocupacional de manera autónoma, integrando quién es con lo que desea \"hacer\" en el mundo.<br><br><br><br><br><br>Bibliografía: Super, D. E. (1957). The psychology of careers. Harper & Row.","aplicacionHtml":"Un joven finaliza la escuela secundaria y se encuentra sumido en una total confusión respecto a qué carrera elegir.<br><br><br><br><br><br>Analizar juntos el árbol genealógico laboral para desactivar mandatos familiares inconscientes ('en esta familia todos son médicos').<br><br><br><br><br><br>Realizar ejercicios de fantasía guiada sobre un día de trabajo ideal para conectar sus intereses reales con las opciones académicas.","categoriaId":7},{"id":13,"tipo":"🌞 Concepto","titulo":"Parafraseo","resumen":"Repetición con otras palabras de la idea principal expuesta por el consultante.","desarrollo":"A diferencia del reflejo (que se centra en la emoción), el parafraseo se centra en el contenido cognitivo o los hechos del relato. Sirve para dos propósitos: demostrar al consultante que se le está prestando atención sostenida y ayudarle a escuchar sus propios pensamientos de manera más clara y ordenada, facilitando la organización de su discurso.\n\n\nBibliografía: Cormier, W. H., & Cormier, L. S. (1994). Estrategias de entrevista para terapeutas. Desclée de Brouwer.","aplicacion":"Un consultante relata de manera confusa y desorganizada un enredo de discusiones familiares por una herencia.\n\n\nEl counselor ordena los hechos: 'A ver si comprendí bien: tu hermano vendió el auto sin avisarte y ahora te pide que firmes la cesión de derechos'.\n\n\nSintetizar el contenido cognitivo: 'O sea que has intentado tres estrategias diferentes con tu jefe y ninguna funcionó para reducir tu horario'.","desarrolloHtml":"A diferencia del reflejo (que se centra en la emoción), el parafraseo se centra en el contenido cognitivo o los hechos del relato. Sirve para dos propósitos: demostrar al consultante que se le está prestando atención sostenida y ayudarle a escuchar sus propios pensamientos de manera más clara y ordenada, facilitando la organización de su discurso.<br><br><br><br><br><br>Bibliografía: Cormier, W. H., & Cormier, L. S. (1994). Estrategias de entrevista para terapeutas. Desclée de Brouwer.","aplicacionHtml":"Un consultante relata de manera confusa y desorganizada un enredo de discusiones familiares por una herencia.<br><br><br><br><br><br>El counselor ordena los hechos: 'A ver si comprendí bien: tu hermano vendió el auto sin avisarte y ahora te pide que firmes la cesión de derechos'.<br><br><br><br><br><br>Sintetizar el contenido cognitivo: 'O sea que has intentado tres estrategias diferentes con tu jefe y ninguna funcionó para reducir tu horario'.","categoriaId":2},{"id":38,"tipo":"🌞 Concepto","titulo":"Prevención Primaria","resumen":"Intervenciones del counselor para promover la salud mental antes de que surja un problema.","desarrollo":"Su enfoque es proactivo, poblacional e institucional. Incluye programas de educación emocional en escuelas, talleres para padres, preparación para la jubilación o gestión del estrés en empresas. La meta es reducir la incidencia de crisis psicosociales brindando herramientas tempranas para el afrontamiento adecuado de las vicisitudes de la vida.\n\n\nBibliografía: Caplan, G. (1964). Principios de psiquiatría preventiva. Editorial Paidós.","aplicacion":"Diseño de un programa institucional de Counseling para una empresa con altos índices de estrés laboral.\n\n\nCoordinar talleres periódicos sobre manejo del estrés, ergonomía mental y técnicas de respiración para los empleados administrativos.\n\n\nDictar conferencias abiertas en centros comunitarios acerca de pautas de crianza respetuosa destinadas a padres primerizos.","desarrolloHtml":"Su enfoque es proactivo, poblacional e institucional. Incluye programas de educación emocional en escuelas, talleres para padres, preparación para la jubilación o gestión del estrés en empresas. La meta es reducir la incidencia de crisis psicosociales brindando herramientas tempranas para el afrontamiento adecuado de las vicisitudes de la vida.<br><br><br><br><br><br>Bibliografía: Caplan, G. (1964). Principios de psiquiatría preventiva. Editorial Paidós.","aplicacionHtml":"Diseño de un programa institucional de Counseling para una empresa con altos índices de estrés laboral.<br><br><br><br><br><br>Coordinar talleres periódicos sobre manejo del estrés, ergonomía mental y técnicas de respiración para los empleados administrativos.<br><br><br><br><br><br>Dictar conferencias abiertas en centros comunitarios acerca de pautas de crianza respetuosa destinadas a padres primerizos.","categoriaId":7},{"id":39,"tipo":"🌞 Concepto","titulo":"Psicoeducación","resumen":"Brindar información útil al consultante para que entienda su proceso emocional.","desarrollo":"Aunque el counseling humanista es no-directivo, a veces es necesario normalizar la experiencia del consultante explicándole cómo funciona el estrés, el ciclo de la ansiedad o las etapas del duelo. Esto disminuye el temor a \"estar volviéndose loco\", devuelve la previsibilidad y otorga herramientas conceptuales para manejar los síntomas.\n\n\nBibliografía: Authier, J., Gustafson, K., Guerney, B., & Kasdorf, J. A. (1975). The psychological practitioner as a teacher: A theoretical-historical and practical review. The Counseling Psychologist.","aplicacion":"Un consultante acude aterrorizado tras experimentar su primer ataque de pánico, creyendo que sufrió un infarto.\n\n\nExplicar de forma didáctica la respuesta fisiológica de la ansiedad, aclarando que la adrenalina tiene un límite y que no corre peligro de muerte.\n\n\nPresentar al consultante las etapas esperables del proceso de duelo para que comprebda que sus días de recaída son normales.","desarrolloHtml":"Aunque el counseling humanista es no-directivo, a veces es necesario normalizar la experiencia del consultante explicándole cómo funciona el estrés, el ciclo de la ansiedad o las etapas del duelo. Esto disminuye el temor a \"estar volviéndose loco\", devuelve la previsibilidad y otorga herramientas conceptuales para manejar los síntomas.<br><br><br><br><br><br>Bibliografía: Authier, J., Gustafson, K., Guerney, B., & Kasdorf, J. A. (1975). The psychological practitioner as a teacher: A theoretical-historical and practical review. The Counseling Psychologist.","aplicacionHtml":"Un consultante acude aterrorizado tras experimentar su primer ataque de pánico, creyendo que sufrió un infarto.<br><br><br><br><br><br>Explicar de forma didáctica la respuesta fisiológica de la ansiedad, aclarando que la adrenalina tiene un límite y que no corre peligro de muerte.<br><br><br><br><br><br>Presentar al consultante las etapas esperables del proceso de duelo para que comprebda que sus días de recaída son normales.","categoriaId":2},{"id":5,"tipo":"🌞 Concepto","titulo":"Rapport","resumen":"Clima de confianza y sintonía mutua que facilita la apertura en la sesión.","desarrollo":"Es el puente psicológico que se construye en los primeros encuentros. Se logra a través de la calidez, la sincronía no verbal y el respeto. Un buen rapport disminuye la ansiedad inicial del consultante y crea el andamiaje afectivo necesario para que las intervenciones terapéuticas posteriores sean recibidas sin resistencias severas.\n\n\nBibliografía: Bordin, E. S. (1979). The generalizability of the psychoanalytic concept of the working alliance. Psychotherapy: Theory, Research & Practice.","aplicacion":"Primeros minutos de la sesión inicial con un adolescent que asiste obligado por sus padres.\n\n\nIniciar la charla validando su incomodidad y conversando sobre sus gustos (música, videojuegos), adoptando una postura corporal relajada.\n\n\nOfrecer un vaso de agua, modular un tono de voz suave y explicar que es un espacio seguro donde él decide qué y cuándo hablar.","desarrolloHtml":"Es el puente psicológico que se construye en los primeros encuentros. Se logra a través de la calidez, la sincronía no verbal y el respeto. Un buen rapport disminuye la ansiedad inicial del consultante y crea el andamiaje afectivo necesario para que las intervenciones terapéuticas posteriores sean recibidas sin resistencias severas.<br><br><br><br><br><br>Bibliografía: Bordin, E. S. (1979). The generalizability of the psychoanalytic concept of the working alliance. Psychotherapy: Theory, Research & Practice.","aplicacionHtml":"Primeros minutos de la sesión inicial con un adolescent que asiste obligado por sus padres.<br><br><br><br><br><br>Iniciar la charla validando su incomodidad y conversando sobre sus gustos (música, videojuegos), adoptando una postura corporal relajada.<br><br><br><br><br><br>Ofrecer un vaso de agua, modular un tono de voz suave y explicar que es un espacio seguro donde él decide qué y cuándo hablar.","categoriaId":3},{"id":43,"tipo":"🌞 Concepto","titulo":"Recursos Internos","resumen":"Fortalezas, talentos y habilidades que la persona posee para afrontar dificultades.","desarrollo":"En contraposición a la visión patologizante, el counseling presupone que toda persona tiene un repertorio de competencias vitales que quizás han quedado opacadas por la crisis actual. La tarea compartida es hacer inventario de estos recursos (inteligencia, humor, perseverancia, empatía, experiencias de éxito pasadas) y reactivarlos para solucionar el conflicto presente.\n\n\nBibliografía: Seligman, M. E. P. (2002). La auténtica felicidad. Ediciones B.","aplicacion":"Una consultante se siente completamente desamparada e incapaz de afrontar una separación matrimonial tras 20 años.\n\n\nAyudarle a recordar cómo en el pasado superó mudanzas complejas y duelos previos apelando a su resiliencia y capacidad organizativa.\n\n\nIdentificar y validar su capacidad analítica y su facilidad para tejer redes de apoyo afectivo como herramientas clave para esta etapa.","desarrolloHtml":"En contraposición a la visión patologizante, el counseling presupone que toda persona tiene un repertorio de competencias vitales que quizás han quedado opacadas por la crisis actual. La tarea compartida es hacer inventario de estos recursos (inteligencia, humor, perseverancia, empatía, experiencias de éxito pasadas) y reactivarlos para solucionar el conflicto presente.<br><br><br><br><br><br>Bibliografía: Seligman, M. E. P. (2002). La auténtica felicidad. Ediciones B.","aplicacionHtml":"Una consultante se siente completamente desamparada e incapaz de afrontar una separación matrimonial tras 20 años.<br><br><br><br><br><br>Ayudarle a recordar cómo en el pasado superó mudanzas complejas y duelos previos apelando a su resiliencia y capacidad organizativa.<br><br><br><br><br><br>Identificar y validar su capacidad analítica y su facilidad para tejer redes de apoyo afectivo como herramientas clave para esta etapa.","categoriaId":4},{"id":12,"tipo":"🌞 Concepto","titulo":"Reflejo","resumen":"Intervención donde el counselor devuelve al consultante la emoción que este expresó.","desarrollo":"Es una técnica que actúa como un \"espejo psicológico\". Al reflejar el sentimiento (ej. \"Pareces sentirte frustrado por esto...\"), el counselor ayuda al consultante a objetivar y validar su propia emoción. Existen diferentes profundidades de reflejo; los más profundos logran captar emociones implícitas, ayudando a la persona a clarificar lo que realmente siente bajo la superficie.\n\n\nBibliografía: Carkhuff, R. R. (1993). El arte de ayudar. Human Resource Development Press.","aplicacion":"El consultante narra con rapidez y agitación cómo sus hijos ignoran sus peticiones en el hogar.\n\n\nEl counselor interviene pausadamente: 'Te sientes muy invisible y sola en tu propia casa, ¿es esa la sensación?'.\n\n\nCaptar la emoción oculta tras una aparente ironía: 'Te ríes al contarlo, pero percibo que hay mucha indignación guardada en ti'.","desarrolloHtml":"Es una técnica que actúa como un \"espejo psicológico\". Al reflejar el sentimiento (ej. \"Pareces sentirte frustrado por esto...\"), el counselor ayuda al consultante a objetivar y validar su propia emoción. Existen diferentes profundidades de reflejo; los más profundos logran captar emociones implícitas, ayudando a la persona a clarificar lo que realmente siente bajo la superficie.<br><br><br><br><br><br>Bibliografía: Carkhuff, R. R. (1993). El arte de ayudar. Human Resource Development Press.","aplicacionHtml":"El consultante narra con rapidez y agitación cómo sus hijos ignoran sus peticiones en el hogar.<br><br><br><br><br><br>El counselor interviene pausadamente: 'Te sientes muy invisible y sola en tu propia casa, ¿es esa la sensación?'.<br><br><br><br><br><br>Captar la emoción oculta tras una aparente ironía: 'Te ríes al contarlo, pero percibo que hay mucha indignación guardada en ti'.","categoriaId":2},{"id":19,"tipo":"🌞 Concepto","titulo":"Relación de Ayuda","resumen":"Vínculo profesional cuyo objetivo es facilitar el crecimiento del otro.","desarrollo":"Es una interacción interpersonal estructurada donde al menos una de las partes intenta promover en la otra el crecimiento, el desarrollo, la maduración y una mejor capacidad para funcionar frente a la vida. Se diferencia de la amistad social en su asimetría técnica, su direccionalidad hacia metas y sus límites éticos claros.\n\n\nBibliografía: Rogers, C. (1961). El proceso de convertirse en persona (Cap. 3: Las características de una relación de ayuda). Paidós.","aplicacion":"Establecimiento de límites éticos cuando un consultante invita al counselor a su fiesta de cumpleaños personal.\n\n\nDeclinar amablemente: 'Agradezco mucho tu invitación, pero para cuidar la transparencia de nuestro espacio prefiero mantenerlo en lo profesional'.\n\n\nEl counselor evita usar el tiempo de la sesión para desahogarse sobre sus propios problemas personales, manteniendo la asimetría técnica.","desarrolloHtml":"Es una interacción interpersonal estructurada donde al menos una de las partes intenta promover en la otra el crecimiento, el desarrollo, la maduración y una mejor capacidad para funcionar frente a la vida. Se diferencia de la amistad social en su asimetría técnica, su direccionalidad hacia metas y sus límites éticos claros.<br><br><br><br><br><br>Bibliografía: Rogers, C. (1961). El proceso de convertirse en persona (Cap. 3: Las características de una relación de ayuda). Paidós.","aplicacionHtml":"Establecimiento de límites éticos cuando un consultante invita al counselor a su fiesta de cumpleaños personal.<br><br><br><br><br><br>Declinar amablemente: 'Agradezco mucho tu invitación, pero para cuidar la transparencia de nuestro espacio prefiero mantenerlo en lo profesional'.<br><br><br><br><br><br>El counselor evita usar el tiempo de la sesión para desahogarse sobre sus propios problemas personales, manteniendo la asimetría técnica.","categoriaId":3},{"id":8,"tipo":"🌞 Concepto","titulo":"Resiliencia","resumen":"Capacidad del ser humano para sobreponerse a situaciones adversas y salir fortalecido.","desarrollo":"No se trata solo de resistir el trauma o el estrés, sino de integrar la experiencia dolorosa y generar un aprendizaje significativo. En el counseling, se promueve identificando los \"factores de protección\" internos y externos del consultante, reestructurando las narrativas de victimización hacia narrativas de agencia y supervivencia activa.\n\n\nBibliografía: Cyrulnik, B. (2001). Los patitos feos: La resiliencia, una infancia infeliz no determina la vida. Editorial Gedisa.","aplicacion":"Acompañamiento a un consultante que perdió el negocio de toda su vida debido a una crisis económica severa.\n\n\nRedirigir el foco del fracaso hacia sus recursos: 'Perdiste el negocio, pero conservas intacta tu capacidad de gestión y tu experiencia'.\n\n\nDiseñar pequeños pasos para su reinvención laboral, integrando la dolorosa pérdida como un proceso de aprendizaje y fortaleza.","desarrolloHtml":"No se trata solo de resistir el trauma o el estrés, sino de integrar la experiencia dolorosa y generar un aprendizaje significativo. En el counseling, se promueve identificando los \"factores de protección\" internos y externos del consultante, reestructurando las narrativas de victimización hacia narrativas de agencia y supervivencia activa.<br><br><br><br><br><br>Bibliografía: Cyrulnik, B. (2001). Los patitos feos: La resiliencia, una infancia infeliz no determina la vida. Editorial Gedisa.","aplicacionHtml":"Acompañamiento a un consultante que perdió el negocio de toda su vida debido a una crisis económica severa.<br><br><br><br><br><br>Redirigir el foco del fracaso hacia sus recursos: 'Perdiste el negocio, pero conservas intacta tu capacidad de gestión y tu experiencia'.<br><br><br><br><br><br>Diseñar pequeños pasos para su reinvención laboral, integrando la dolorosa pérdida como un proceso de aprendizaje y fortaleza.","categoriaId":4},{"id":21,"tipo":"🌞 Concepto","titulo":"Resolución de Conflictos","resumen":"Estrategias para gestionar y resolver tensiones interpersonales o internas.","desarrollo":"Involucra el acompañamiento para identificar las verdaderas necesidades subyacentes detrás de las posiciones rígidas. En el ámbito interpersonal, enseña al consultante a separar a la persona del problema, generar opciones mutuamente beneficiosas y negociar basándose en criterios objetivos. Internamente, implica reconciliar aspectos polarizados de la personalidad.\n\n\nBibliografía: Fisher, R., Ury, W., & Patton, B. (1991). Obtenga el sí: El arte de negociar sin ceder. Gestión 2000.","aplicacion":"Acompañamiento a un consultante atrapado en una tensa disputa con su socio por el manejo de los fondos.\n\n\nAyudarlo a separar el problema relacional de los intereses económicos, identificando la necesidad mutua de seguridad y previsibilidad.\n\n\nFacilitar la reconciliación de un conflicto interno entre su deseo de estabilidad económica y su anhelo de pasar más tiempo libre.","desarrolloHtml":"Involucra el acompañamiento para identificar las verdaderas necesidades subyacentes detrás de las posiciones rígidas. En el ámbito interpersonal, enseña al consultante a separar a la persona del problema, generar opciones mutuamente beneficiosas y negociar basándose en criterios objetivos. Internamente, implica reconciliar aspectos polarizados de la personalidad.<br><br><br><br><br><br>Bibliografía: Fisher, R., Ury, W., & Patton, B. (1991). Obtenga el sí: El arte de negociar sin ceder. Gestión 2000.","aplicacionHtml":"Acompañamiento a un consultante atrapado en una tensa disputa con su socio por el manejo de los fondos.<br><br><br><br><br><br>Ayudarlo a separar el problema relacional de los intereses económicos, identificando la necesidad mutua de seguridad y previsibilidad.<br><br><br><br><br><br>Facilitar la reconciliación de un conflicto interno entre su deseo de estabilidad económica y su anhelo de pasar más tiempo libre.","categoriaId":7},{"id":40,"tipo":"🌞 Concepto","titulo":"Respeto","resumen":"Actitud base que honra la individualidad, ritmos y creencias del consultante.","desarrollo":"Es el fundamento ético y actitudinal del profesional. Implica abstenerse de imponer los propios valores, ideologías o urgencias. El counselor respeta los silencios del otro, sus retrocesos, sus defensas y su marco ideológico. Reconoce profundamente al consultante como un sujeto de derechos, dotado de dignidad inalienable y autonomía moral.\n\n\nBibliografía: Egan, G. (2001). El orientador experto. Brooks/Cole.","aplicacion":"El consultante decide continuar en una relación que el counselor considera tóxica, basándose en sus propios valores.\n\n\nEl counselor suspende sus deseos de aconsejar la separación y acompaña las reflexiones de la persona honrando su libre albedrío.\n\n\nRespetar de forma estricta los silencios prolongados del consultante en la sesión, sin forzarlo a hablar cuando no se siente listo.","desarrolloHtml":"Es el fundamento ético y actitudinal del profesional. Implica abstenerse de imponer los propios valores, ideologías o urgencias. El counselor respeta los silencios del otro, sus retrocesos, sus defensas y su marco ideológico. Reconoce profundamente al consultante como un sujeto de derechos, dotado de dignidad inalienable y autonomía moral.<br><br><br><br><br><br>Bibliografía: Egan, G. (2001). El orientador experto. Brooks/Cole.","aplicacionHtml":"El consultante decide continuar en una relación que el counselor considera tóxica, basándose en sus propios valores.<br><br><br><br><br><br>El counselor suspende sus deseos de aconsejar la separación y acompaña las reflexiones de la persona honrando su libre albedrío.<br><br><br><br><br><br>Respetar de forma estricta los silencios prolongados del consultante en la sesión, sin forzarlo a hablar cuando no se siente listo.","categoriaId":1},{"id":42,"tipo":"🌞 Concepto","titulo":"Silencio Terapéutico","resumen":"Uso consciente de las pausas para permitir que el consultante procese la información.","desarrollo":"El silencio en sesión no es un \"vacío\", sino una herramienta activa. Ocurre cuando el consultante ha tenido un insight profundo y necesita tiempo para asimilarlo, o cuando está luchando por encontrar las palabras precisas para una emoción difícil. Un counselor inexperto teme al silencio e interrumpe; un buen profesional lo sostiene pacientemente.\n\n\nBibliografía: Ladany, N., et al. (2004). Psychotherapy process and outcome. In Lambert, M.J. (Ed.), Bergin and Garfield's Handbook of Psychotherapy and Behavior Change.","aplicacion":"El consultante acaba de conmoverse profundamente al darse cuenta de cómo repite el patrón de abandono de su padre.\n\n\nEl counselor sostiene el silencio absoluto durante dos minutos, permitiendo que la persona asimile y procese el impacto de su insight.\n\n\nNo interrumpir cuando el consultante cierra los ojos buscando conectar internamente con el recuerdo exacto de una situación difícil.","desarrolloHtml":"El silencio en sesión no es un \"vacío\", sino una herramienta activa. Ocurre cuando el consultante ha tenido un insight profundo y necesita tiempo para asimilarlo, o cuando está luchando por encontrar las palabras precisas para una emoción difícil. Un counselor inexperto teme al silencio e interrumpe; un buen profesional lo sostiene pacientemente.<br><br><br><br><br><br>Bibliografía: Ladany, N., et al. (2004). Psychotherapy process and outcome. In Lambert, M.J. (Ed.), Bergin and Garfield's Handbook of Psychotherapy and Behavior Change.","aplicacionHtml":"El consultante acaba de conmoverse profundamente al darse cuenta de cómo repite el patrón de abandono de su padre.<br><br><br><br><br><br>El counselor sostiene el silencio absoluto durante dos minutos, permitiendo que la persona asimile y procese el impacto de su insight.<br><br><br><br><br><br>No interrumpir cuando el consultante cierra los ojos buscando conectar internamente con el recuerdo exacto de una situación difícil.","categoriaId":2},{"id":45,"tipo":"🌞 Concepto","titulo":"Supervisión","resumen":"Espacio donde el counselor revisa su propio trabajo clínico con un profesional experto.","desarrollo":"Es un imperativo ético y metodológico. En la supervisión, el profesional expone sus casos, sus dudas, sus \"puntos ciegos\" y sus reacciones transferenciales/contratransferenciales ante un supervisor. Garantiza la calidad del servicio al usuario, previene el burnout del terapeuta y fomenta el desarrollo continuo de sus habilidades profesionales.\n\n\nBibliografía: Hawkins, P., & Shohet, R. (1989). Supervision in the Helping Professions. Open University Press.","aplicacion":"El counselor se descubre inusualmente intolerante o enojado con las actitudes de un consultante específico en las sesiones.\n\n\nLlevar el caso ante un supervisor para analizar sus puntos ciegos personales y evitar que su historia interfiera en el proceso.\n\n\nRevisar junto al supervisor el diseño de las intervenciones en un caso complejo de crisis vital para asegurar la calidad ética.","desarrolloHtml":"Es un imperativo ético y metodológico. En la supervisión, el profesional expone sus casos, sus dudas, sus \"puntos ciegos\" y sus reacciones transferenciales/contratransferenciales ante un supervisor. Garantiza la calidad del servicio al usuario, previene el burnout del terapeuta y fomenta el desarrollo continuo de sus habilidades profesionales.<br><br><br><br><br><br>Bibliografía: Hawkins, P., & Shohet, R. (1989). Supervision in the Helping Professions. Open University Press.","aplicacionHtml":"El counselor se descubre inusualmente intolerante o enojado con las actitudes de un consultante específico en las sesiones.<br><br><br><br><br><br>Llevar el caso ante un supervisor para analizar sus puntos ciegos personales y evitar que su historia interfiera en el proceso.<br><br><br><br><br><br>Revisar junto al supervisor el diseño de las intervenciones en un caso complejo de crisis vital para asegurar la calidad ética.","categoriaId":6},{"id":16,"tipo":"🌞 Concepto","titulo":"Tendencia Actualizante","resumen":"Motivación intrínseca de todo organismo para desarrollarse y preservarse.","desarrollo":"Es el axioma biológico y psicológico fundamental de Rogers. Es la fuerza vital que impulsa a una planta a buscar la luz solar, y al ser humano a buscar la independencia, la madurez y la socialización constructiva. Aun bajo condiciones adversas, esta tendencia persigue el mantenimiento y enriquecimiento del organismo.\n\n\nBibliografía: Rogers, C. (1980). El camino del ser. Editorial Kairós.","aplicacion":"Acompañamiento a un joven con un severo cuadro de apatía y desgano tras abandonar sus estudios.\n\n\nIdentificar y validar que, a pesar de su desgano, mantiene el impulso vital de levantarse a cuidar sus mascotas y buscar talleres cortos.\n\n\nApoyar la fuerza interna que empuja al consultante a buscar un alquiler compartido con tal de salir de un entorno familiar violento.","desarrolloHtml":"Es el axioma biológico y psicológico fundamental de Rogers. Es la fuerza vital que impulsa a una planta a buscar la luz solar, y al ser humano a buscar la independencia, la madurez y la socialización constructiva. Aun bajo condiciones adversas, esta tendencia persigue el mantenimiento y enriquecimiento del organismo.<br><br><br><br><br><br>Bibliografía: Rogers, C. (1980). El camino del ser. Editorial Kairós.","aplicacionHtml":"Acompañamiento a un joven con un severo cuadro de apatía y desgano tras abandonar sus estudios.<br><br><br><br><br><br>Identificar y validar que, a pesar de su desgano, mantiene el impulso vital de levantarse a cuidar sus mascotas y buscar talleres cortos.<br><br><br><br><br><br>Apoyar la fuerza interna que empuja al consultante a buscar un alquiler compartido con tal de salir de un entorno familiar violento.","categoriaId":5},{"id":23,"tipo":"🌞 Concepto","titulo":"Toma de Decisiones","resumen":"Proceso reflexivo para elegir un curso de acción alineado con los propios valores.","desarrollo":"El counselor no toma decisiones por el consultante ni da consejos, sino que facilita un esquema heurístico. Esto incluye definir el problema, generar alternativas, evaluar consecuencias (pros y contras, riesgos), conectar la decisión con el proyecto vital de la persona y, finalmente, apoyar el compromiso con la acción elegida, mitigando la parálisis por análisis.\n\n\nBibliografía: Janis, I. L., & Mann, L. (1977). Decision making: A psychological analysis of conflict, choice, and commitment. Free Press.","aplicacion":"Un consultante se encuentra paralizado ante la opción de aceptar un trabajo en otra provincia o quedarse cerca de su familia.\n\n\nConstruir un mapa de alternativas evaluando pros, contras y riesgos de cada opción en base a su jerarquía de valores personales.\n\n\nExplorar el miedo oculto al fracaso que genera la parálisis por análisis, permitiendo que asuma el compromiso con la opción elegida.","desarrolloHtml":"El counselor no toma decisiones por el consultante ni da consejos, sino que facilita un esquema heurístico. Esto incluye definir el problema, generar alternativas, evaluar consecuencias (pros y contras, riesgos), conectar la decisión con el proyecto vital de la persona y, finalmente, apoyar el compromiso con la acción elegida, mitigando la parálisis por análisis.<br><br><br><br><br><br>Bibliografía: Janis, I. L., & Mann, L. (1977). Decision making: A psychological analysis of conflict, choice, and commitment. Free Press.","aplicacionHtml":"Un consultante se encuentra paralizado ante la opción de aceptar un trabajo en otra provincia o quedarse cerca de su familia.<br><br><br><br><br><br>Construir un mapa de alternativas evaluando pros, contras y riesgos de cada opción en base a su jerarquía de valores personales.<br><br><br><br><br><br>Explorar el miedo oculto al fracaso que genera la parálisis por análisis, permitiendo que asuma el compromiso con la opción elegida.","categoriaId":7},{"id":27,"tipo":"🌞 Concepto","titulo":"Validación Emocional","resumen":"Reconocimiento y legitimación de los sentimientos del consultante como reales y válidos.","desarrollo":"Consiste en comunicar explícitamente a la persona que sus respuestas emocionales tienen sentido dado su contexto, historia o situación actual. No significa estar de acuerdo con la conducta derivada de esa emoción, sino aceptar el derecho de la persona a sentir lo que siente. Es un antídoto poderoso contra la invalidación traumática vivida en ambientes disfuncionales.\n\n\nBibliografía: Linehan, M. M. (1993). Cognitive-behavioral treatment of borderline personality disorder. Guilford Press.","aplicacion":"Un consultante llora sintiéndose culpable por sentir 'alivio' tras la muerte de un familiar luego de una larga enfermedad.\n\n\nEl counselor valida: 'Es completamente humano sentir aligeramiento tras meses de un desgaste tan extremo; no te hace una mala persona'.\n\n\nLegitimar el enojo de un consultante ante una injusticia laboral, confirmando que su reacción es una respuesta natural ante el maltrato.","desarrolloHtml":"Consiste en comunicar explícitamente a la persona que sus respuestas emocionales tienen sentido dado su contexto, historia o situación actual. No significa estar de acuerdo con la conducta derivada de esa emoción, sino aceptar el derecho de la persona a sentir lo que siente. Es un antídoto poderoso contra la invalidación traumática vivida en ambientes disfuncionales.<br><br><br><br><br><br>Bibliografía: Linehan, M. M. (1993). Cognitive-behavioral treatment of borderline personality disorder. Guilford Press.","aplicacionHtml":"Un consultante llora sintiéndose culpable por sentir 'alivio' tras la muerte de un familiar luego de una larga enfermedad.<br><br><br><br><br><br>El counselor valida: 'Es completamente humano sentir aligeramiento tras meses de un desgaste tan extremo; no te hace una mala persona'.<br><br><br><br><br><br>Legitimar el enojo de un consultante ante una injusticia laboral, confirmando que su reacción es una respuesta natural ante el maltrato.","categoriaId":2}];

    // --- BASES DE DATOS SIMULADAS PARA NUEVOS JUEGOS ---
    const dbExtraCasos = [
      { q: "Siento que nada de lo que hago tiene sentido últimamente.", correct: "Entiendo que te sientes desmotivado y vacío en este momento.", wrong: ["Deberías salir a caminar, eso ayuda.", "No digas eso, tienes muchas cosas buenas.", "¿Por qué no pruebas un nuevo hobby?"] },
      { q: "Mi pareja me dejó y siento que me muero.", correct: "Sientes un dolor muy profundo y abrumador por esta pérdida.", wrong: ["Ya vas a encontrar a alguien mejor.", "El tiempo lo cura todo, ten paciencia.", "Quizás no era la persona indicada para ti."] },
      { q: "Tengo mucho miedo de hablar en público, me paralizo.", correct: "La idea de exponerte frente a otros te genera una gran ansiedad.", wrong: ["Solo imagina que están todos desnudos.", "No te preocupes, a todos les pasa.", "Tienes que ser valiente y enfrentarlo."] }
    ];
    
    const dbExtraEmpatia = [
      { text: "Comprendo que esta situación te resulta muy frustrante.", isEmpatia: true },
      { text: "No te pongas así, no es para tanto.", isEmpatia: false },
      { text: "Veo que esto te ha dolido más de lo que esperabas.", isEmpatia: true },
      { text: "Yo en tu lugar habría hecho lo mismo.", isEmpatia: false },
      { text: "Debe ser muy difícil lidiar con tanta presión.", isEmpatia: true },
      { text: "Mira el lado positivo, al menos tienes salud.", isEmpatia: false }
    ];

    const dbExtraAutores = [
      { cita: "El organismo tiene una tendencia y un esfuerzo básicos: actualizarse, mantenerse y enriquecer las experiencias.", autor: "Carl Rogers" },
      { cita: "Al hombre se le puede arrebatar todo salvo una cosa: la última de las libertades humanas —la elección de la actitud personal.", autor: "Viktor Frankl" },
      { cita: "No estoy en este mundo para estar a la altura de tus expectativas, ni tú para estar a la altura de las mías.", autor: "Fritz Perls" },
      { cita: "La neurosis es siempre un sustituto de un sufrimiento legítimo.", autor: "Carl Jung" },
      { cita: "Lo que las personas sienten es tan importante como lo que hacen o piensan.", autor: "Irvin Yalom" }
    ];

    const frasesCounselor = [
      "La escucha activa es tu mejor herramienta.",
      "Confía en la tendencia actualizante.",
      "Validar las emociones abre puertas.",
      "No juzgues, comprende profundamente.",
      "La aceptación incondicional sana.",
      "Acompaña sin dirigir el camino.",
      "El silencio también es una intervención.",
      "Muestra congruencia en cada respuesta."
    ];

    let activeCategoryId = null;
    let activeConceptId = null;

    const elAppContainer = document.getElementById('main-app-container');
    const elListCategorias = document.getElementById('list-categorias');
    const elGridConceptos = document.getElementById('grid-conceptos');
    const elDetailTarjeta = document.getElementById('detail-tarjeta');
    const colTarjetaContainer = document.getElementById('col-tarjeta-container');
    const elArcadeView = document.getElementById('arcade-main-view');

    let timerGlobal = null; 
    let loopInvasores = null;
    
    // --- VARIABLES GLOBALES, RESPUESTAS Y MARATÓN ---
    let puntajeGlobalTotal = 0;
    let historialRespuestas = [];
    let modoMaraton = false;
    let indiceMaraton = 0;
    let puntajeMaraton = 0;
    let maxPuntajeMaraton = 0;
    const MARATON_JUEGOS = [
      () => startFlashcards(), () => startTrivia(1), () => startTrivia(2),
      () => startMatching(), () => startHangman(), () => startSimulador(),
      () => startEmpatia(), () => startCorrientes(), () => startAutores(),
      () => startCrucigrama(), () => startFragmentado(), () => startBombardeo(),
      () => startWordle(), () => startSopa(), () => startInvasores()
    ];

    function obtenerMensajeCounselor() {
      return frasesCounselor[Math.floor(Math.random() * frasesCounselor.length)];
    }

    function renderDashboardHTML() {
      return `
        <div class="global-dashboard">
          <div class="dashboard-counselor">
            <span class="counselor-avatar">🧠</span>
            <span class="counselor-msg">"${obtenerMensajeCounselor()}"</span>
          </div>
          <div class="dashboard-score">
            🏆 Global: ${puntajeGlobalTotal} pts
          </div>
        </div>
      `;
    }

    function renderCategorias() {
      const cardTodas = `<div class="cat-card ${activeCategoryId === 'all' ? 'active' : ''}" style="--cat-color: var(--brand-color)" onclick="selectCategory('all')"><div class="cat-title">Todas las categorías</div><div class="cat-desc">Ver todos los ítems alfabéticamente</div></div>`;
      const cardsCategorias = dbCategorias.map(cat => `<div class="cat-card ${activeCategoryId == cat.id ? 'active' : ''}" style="--cat-color: ${cat.color}" onclick="selectCategory('${cat.id}')"><div class="cat-title">${cat.nombre}</div><div class="cat-desc">${cat.descripcion}</div></div>`).join('');
      const cardForm = `<div class="cat-card cat-card-form ${activeCategoryId === 'form' ? 'active' : ''}" style="--cat-color: #3498db" onclick="openSection('form')"><div class="cat-title">📝 Sugerir concepto</div><div class="cat-desc">Propone nuevos términos</div></div>`;
      const cardGame = `<div class="cat-card cat-card-game ${activeCategoryId === 'game' ? 'active' : ''}" style="--cat-color: #9b59b6" onclick="openSection('game')"><div class="cat-title">🎮 Arcade de Juegos</div><div class="cat-desc">15 modalidades interactivas</div></div>`;
      elListCategorias.innerHTML = cardTodas + cardsCategorias + cardForm + cardGame;
    }

    function renderConceptos() {
      if (activeCategoryId === 'form' || activeCategoryId === 'game') return;
      let filtrados = [];
      let colorActivo = 'var(--brand-color)'; 
      if (activeCategoryId === 'all' || !activeCategoryId) {
        filtrados = [...dbGlosario].sort((a, b) => String(a.titulo || '').localeCompare(String(b.titulo || ''), 'es'));
      } else {
        filtrados = dbGlosario.filter(g => g.categoriaId == activeCategoryId).sort((a, b) => String(a.titulo || '').localeCompare(String(b.titulo || ''), 'es'));
        const catActiva = dbCategorias.find(c => c.id == activeCategoryId);
        colorActivo = catActiva ? catActiva.color : '#ccc';
      }
      colTarjetaContainer.style.setProperty('--cat-color', colorActivo);
      if (filtrados.length === 0) {
        elGridConceptos.innerHTML = '<div class="empty-state">No hay conceptos para mostrar.</div>'; return;
      }
      let htmlCartas = ''; let letraActual = '';
      filtrados.forEach(g => {
        let tituloLimpio = String(g.titulo || '').trim();
        let primeraLetra = tituloLimpio.charAt(0).toUpperCase() || '#';
        if (primeraLetra !== letraActual) {
          letraActual = primeraLetra; htmlCartas += `<div class="letter-divider">${letraActual}</div>`;
        }
        let colorCard = colorActivo;
        if (activeCategoryId === 'all') {
           const catOriginal = dbCategorias.find(c => c.id == g.categoriaId);
           if (catOriginal) colorCard = catOriginal.color;
        }
        htmlCartas += `<div class="concept-card ${activeConceptId == g.id ? 'active' : ''}" style="--cat-color: ${colorCard}" onclick="selectConcept('${g.id}')"><div class="color-dot"></div><div class="concept-title">${g.titulo}</div><div class="concept-summary">${g.resumen}</div></div>`;
      });
      elGridConceptos.innerHTML = htmlCartas;
    }

    function renderTarjeta() {
      if (activeCategoryId === 'form' || activeCategoryId === 'game') return;
      const concepto = dbGlosario.find(g => g.id == activeConceptId);
      if (!concepto) { elDetailTarjeta.innerHTML = '<div class="empty-state">Selecciona un concepto en el panel central.</div>'; return; }
      const googleSearchUrl = "https://www.google.com/search?q=" + encodeURIComponent("Counseling: " + concepto.titulo);
      elDetailTarjeta.innerHTML = `<div class="detail-container"><h1 class="detail-title">${concepto.titulo}</h1><p class="detail-summary">${concepto.resumen}</p><a href="${googleSearchUrl}" target="_blank" rel="noopener noreferrer" class="btn-google">🔍 Buscar en Google</a>${concepto.desarrolloHtml ? `<div class="section-title"><span>✍️ Desarrollo</span></div><div class="detail-text">${concepto.desarrolloHtml}</div>` : ''}${concepto.aplicacionHtml ? `<div class="section-title"><span>🛠️ Aplicaciones</span></div><div class="detail-text">${concepto.aplicacionHtml}</div>` : ''}</div>`;
    }

    function selectCategory(id) {
      if(timerGlobal) clearInterval(timerGlobal);
      if(loopInvasores) cancelAnimationFrame(loopInvasores);
      elAppContainer.classList.remove('show-form'); elAppContainer.classList.remove('show-game');
      activeCategoryId = id; activeConceptId = null;
      if(elGridConceptos.parentElement) elGridConceptos.parentElement.scrollTop = 0; 
      renderCategorias(); renderConceptos(); renderTarjeta();
    }

    function openSection(type) {
      if(timerGlobal) clearInterval(timerGlobal);
      if(loopInvasores) cancelAnimationFrame(loopInvasores);
      activeCategoryId = type; activeConceptId = null;
      elAppContainer.classList.remove('show-form'); elAppContainer.classList.remove('show-game');
      elAppContainer.classList.add('show-' + type);
      renderCategorias(); if (type === 'game') renderArcadeMenu();
    }

    function selectConcept(id) {
      activeConceptId = id; renderConceptos(); renderTarjeta();
      if (activeCategoryId === 'all') {
        const concepto = dbGlosario.find(g => g.id == activeConceptId);
        const cat = dbCategorias.find(c => c.id == (concepto ? concepto.categoriaId : null));
        if (cat) colTarjetaContainer.style.setProperty('--cat-color', cat.color);
      }
      colTarjetaContainer.classList.add('mobile-open'); 
    }

    function closeMobileDetail() { colTarjetaContainer.classList.remove('mobile-open'); }

    function normalizarP(str) { return str ? str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim() : ''; }
    function mezclarArray(arr) { return [...arr].sort(() => Math.random() - 0.5); }
    function obtenerOpcionesCuatro(correcta, pool) {
      let s = new Set([correcta]);
      while(s.size < 4 && pool.length >= 4) { s.add(pool[Math.floor(Math.random() * pool.length)]); }
      return Array.from(s).sort(() => Math.random() - 0.5);
    }
    function escapeString(str) { return str.replace(/'/g, "\'").replace(/"/g, '&quot;'); }

    let juegoActual = ''; let ronda = 0; let puntajeJuego = 0; let bancoJuego = [];
    const listaTitulosGlobal = dbGlosario.map(g => g.titulo);

    function startMaraton() {
      modoMaraton = true;
      indiceMaraton = 0;
      puntajeMaraton = 0;
      maxPuntajeMaraton = 0;
      MARATON_JUEGOS[0]();
    }

    function renderArcadeMenu() {
      if(timerGlobal) clearInterval(timerGlobal);
      if(loopInvasores) cancelAnimationFrame(loopInvasores);

    // --- 1. FLASHCARDS ---
    function startFlashcards() { historialRespuestas = []; juegoActual = 'flashcards'; ronda = 0; puntajeJuego = 0; bancoJuego = mezclarArray(dbGlosario).slice(0, 10); renderFlashcardRonda(); }
    function renderFlashcardRonda() {
      if(ronda >= 10 || ronda >= bancoJuego.length) return renderFinalResult();

      elArcadeView.innerHTML = renderDashboardHTML() + `<button class="game-back-menu" onclick="renderArcadeMenu()">← Volver al Menú</button><div class="game-active-header"><span>🃏 Tarjetas de Memoria</span><span>Tarjeta ${ronda + 1} / 10</span></div><div class="flashcard-box" onclick="this.classList.toggle('flipped')"><div class="flashcard-inner"><div class="flashcard-face flashcard-front"><h2>${item.titulo}</h2><span>👆 Toca para girar</span></div><div class="flashcard-face flashcard-back"><p><b>Definición:</b><br>${item.resumen}</p></div></div></div><div class="flashcard-actions"><button class="btn-action-fc btn-fc-wrong" onclick="nextFlashcard(false)">🔴 No la sabía</button><button class="btn-action-fc btn-fc-correct" onclick="nextFlashcard(true)">🟢 ¡Me la sabía!</button></div>`;
    }
    function nextFlashcard(supo) { 
      let item = bancoJuego[ronda];
      historialRespuestas.push({pre: item.titulo, res: supo?"Sí":"No", cor: item.titulo, exp: item.resumen});
      if(supo) puntajeJuego++; ronda++; renderFlashcardRonda(); 
    }

    // --- 2. TRIVIAS ---
    function startTrivia(tipo) {
      historialRespuestas = []; juegoActual = 'trivia_' + tipo; ronda = 0; puntajeJuego = 0; bancoJuego = [];
      let poolValidos = dbGlosario.filter(g => g.resumen && g.resumen.length > 5);
      let mezclados = mezclarArray(poolValidos).slice(0, 10);
      mezclados.forEach(g => {
        if(tipo === 1) bancoJuego.push({ pregunta: "¿Qué concepto se define de la siguiente manera?<br><br><i>'" + g.resumen + "'</i>", correcta: g.titulo, opciones: obtenerOpcionesCuatro(g.titulo, listaTitulosGlobal) });
        else if(tipo === 2) {
          let esV = Math.random() > 0.5; let def = g.resumen;
          if(!esV) { let a = mezclarArray(dbGlosario.filter(x => x.id != g.id && x.resumen))[0]; if(a) def = a.resumen; }
          bancoJuego.push({ pregunta: "El concepto <b>" + g.titulo + "</b> se define como:<br><br><i>'" + def + "'</i>", correcta: esV ? "Verdadero" : "Falso", opciones: ["Verdadero", "Falso"] });
        }
      });
      renderTriviaRonda();
    }
    function renderTriviaRonda() {
      if(ronda >= 10 || ronda >= bancoJuego.length) return renderFinalResult();
      let p = bancoJuego[ronda];
      let botones = p.opciones.map(o => `<button class="option-btn" onclick="evaluarRespuestaTrivia(this, '${escapeString(o)}', '${escapeString(p.correcta)}')">${o}</button>`).join('');
      elArcadeView.innerHTML = renderDashboardHTML() + `<button class="game-back-menu" onclick="renderArcadeMenu()">← Volver</button><div class="game-active-header"><span>❓ Trivia</span><span>Ronda ${ronda + 1} / 10</span></div><div class="game-text-question">${p.pregunta}</div><div class="options-stack">${botones}</div>`;
    }
    function evaluarRespuestaTrivia(btn, sel, corr) {
      elArcadeView.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
      let pregClean = bancoJuego[ronda].pregunta.replace(/<[^>]*>?/gm, '');
      historialRespuestas.push({pre: pregClean, res: sel, cor: corr, exp: sel === corr ? "¡Acertaste la definición!" : "La respuesta correcta era " + corr});
      
      if(sel === corr) { btn.classList.add('correct'); puntajeJuego++; } 
      else { btn.classList.add('wrong'); elArcadeView.querySelectorAll('.option-btn').forEach(b => { if(b.innerText === corr) b.classList.add('correct'); }); }
      setTimeout(() => { ronda++; renderTriviaRonda(); }, 1200);
    }

    // --- MATCHING ---
    let itemsSeleccionadosMatching = { concepto: null, definicion: null };
    function startMatching() {
      historialRespuestas = []; juegoActual = 'matching'; ronda = 0; puntajeJuego = 0;
      let pool = mezclarArray(dbGlosario.filter(g => g.resumen)).slice(0, 5);
      bancoJuego = { conceptos: mezclarArray(pool.map(g => ({ id: String(g.id), texto: g.titulo }))), definiciones: mezclarArray(pool.map(g => ({ id: String(g.id), texto: g.resumen.substring(0, 95) + '...' }))), matchedIds: [] };
      itemsSeleccionadosMatching = { concepto: null, definicion: null }; renderMatchingBoard();
    }
    function renderMatchingBoard() {
      if(bancoJuego.matchedIds.length === 5) { 
        puntajeJuego = 10; 
        bancoJuego.matchedIds.forEach(id => {
            let c = dbGlosario.find(g=>g.id == id);
            historialRespuestas.push({ pre: c.titulo, res: "Emparejado", cor: c.titulo, exp: c.resumen });
        });
        return renderFinalResult(); 
      }
      let cHtml = bancoJuego.conceptos.map(c => `<div class="match-item ${bancoJuego.matchedIds.includes(c.id)?'matched':''} ${itemsSeleccionadosMatching.concepto===c.id?'selected':''}" ${!bancoJuego.matchedIds.includes(c.id)?`onclick="selectMatchItem('concepto', '${c.id}')"`:''}>${c.texto}</div>`).join('');
      let dHtml = bancoJuego.definiciones.map(d => `<div class="match-item ${bancoJuego.matchedIds.includes(d.id)?'matched':''} ${itemsSeleccionadosMatching.definicion===d.id?'selected':''}" ${!bancoJuego.matchedIds.includes(d.id)?`onclick="selectMatchItem('definicion', '${d.id}')"`:''}>${d.texto}</div>`).join('');
      elArcadeView.innerHTML = renderDashboardHTML() + `<button class="game-back-menu" onclick="renderArcadeMenu()">← Volver</button><div class="game-active-header"><span>🔗 Match</span><span>Completados: ${bancoJuego.matchedIds.length} / 5</span></div><div class="match-container"><div class="match-col"><h3>Conceptos</h3>${cHtml}</div><div class="match-col"><h3>Definiciones</h3>${dHtml}</div></div>`;
    }
    function selectMatchItem(col, id) {
      itemsSeleccionadosMatching[col] = id;
      if(itemsSeleccionadosMatching.concepto && itemsSeleccionadosMatching.definicion) {
        if(itemsSeleccionadosMatching.concepto === itemsSeleccionadosMatching.definicion) bancoJuego.matchedIds.push(itemsSeleccionadosMatching.concepto);
        itemsSeleccionadosMatching = { concepto: null, definicion: null };
      }
      renderMatchingBoard();
    }

    // --- AHORCADO ---
    function startHangman() { historialRespuestas = []; juegoActual = 'hangman'; ronda = 0; puntajeJuego = 0; bancoJuego = mezclarArray(dbGlosario.filter(g => g.titulo.length > 3 && g.titulo.length < 25)).slice(0, 3); startHangmanWord(); }
    let hangWordObj = {};
    function startHangmanWord() {
      if(ronda >= 3) return renderFinalResult();
      let c = bancoJuego[ronda]; let real = c.titulo.toUpperCase(); let oculta = '';
      for(let i=0; i<real.length; i++) oculta += /[A-ZÁÉÍÓÚÜÑ]/.test(real[i]) ? '_' : real[i];
      hangWordObj = { real, oculta, vidas: 6, usadas: [], pista: c.resumen }; renderHangmanBoard();
    }
    function renderHangmanBoard() {
      let tHtml = "ABCDEFGHIJKLMNÑOPQRSTUVWXYZ".split('').map(l => `<button class="hang-letter ${hangWordObj.usadas.includes(l)?'used':''}" ${hangWordObj.usadas.includes(l)?'disabled':`onclick="guessHangmanLetter('${l}')"`}>${l}</button>`).join('');
      elArcadeView.innerHTML = renderDashboardHTML() + `<button class="game-back-menu" onclick="renderArcadeMenu()">← Volver</button><div class="game-active-header"><span>🔤 Ahorcado</span><span>Palabra ${ronda+1}/3 | Vidas: ${hangWordObj.vidas}</span></div><div class="game-text-question"><b>Pista:</b> "${hangWordObj.pista}"</div><div style="font-size:2rem; letter-spacing:5px; margin:20px 0; word-break: break-all;">${hangWordObj.oculta}</div><div style="display:flex; flex-wrap:wrap; gap:5px; justify-content:center; max-width:400px; margin:0 auto;">${tHtml}</div>`;
    }
    function guessHangmanLetter(l) {
      hangWordObj.usadas.push(l); let lN = normalizarP(l);
      if(normalizarP(hangWordObj.real).includes(lN)) {
        let nO = '';
        for(let i=0; i<hangWordObj.real.length; i++) nO += normalizarP(hangWordObj.real[i]) === lN ? hangWordObj.real[i] : hangWordObj.oculta[i];
        hangWordObj.oculta = nO;
        if(!nO.includes('_')) { 
            historialRespuestas.push({pre: "Palabra Oculta", res: "Descubierta", cor: hangWordObj.real, exp: hangWordObj.pista});
            puntajeJuego+=3; ronda++; setTimeout(startHangmanWord, 1000); 
        }
      } else {
        hangWordObj.vidas--;
        if(hangWordObj.vidas<=0) { 
            historialRespuestas.push({pre: "Palabra Oculta", res: "Fallida", cor: hangWordObj.real, exp: hangWordObj.pista});
            ronda++; setTimeout(startHangmanWord, 1500); 
        }
      }
      renderHangmanBoard();
    }

    // --- NUEVO 1: SIMULADOR DE DIÁLOGO ---

    function evaluarSimulador(btn, sel, corr) {
      elArcadeView.querySelectorAll('.option-btn').forEach(b => b.disabled = true);

      if(sel === corr) { btn.classList.add('correct'); puntajeJuego++; } 
      else { btn.classList.add('wrong'); elArcadeView.querySelectorAll('.option-btn').forEach(b => { if(b.innerText === corr) b.classList.add('correct'); }); }
      setTimeout(() => { ronda++; renderSimulador(); }, 1800);
    }

    // --- NUEVO 2: EMPATÍA O SIMPATÍA ---
    function startEmpatia() { historialRespuestas = []; juegoActual = 'empatia'; ronda = 0; puntajeJuego = 0; bancoJuego = mezclarArray(dbExtraEmpatia).slice(0, 5); renderEmpatia(); }
    function renderEmpatia() {
      if(ronda >= bancoJuego.length) { puntajeJuego = puntajeJuego * 2; return renderFinalResult(); }
      let p = bancoJuego[ronda];
      elArcadeView.innerHTML = renderDashboardHTML() + `<button class="game-back-menu" onclick="renderArcadeMenu()">← Volver</button><div class="game-active-header"><span>⚖️ ¿Empatía o Inadecuado?</span><span>Frase ${ronda + 1} / 5</span></div><div class="flashcard-box" style="cursor:default; border:none; box-shadow:0 10px 20px rgba(0,0,0,0.1);"><div class="flashcard-face flashcard-front" style="position:relative;"><h2>"${p.text}"</h2></div></div><div class="swipe-container"><button class="btn-swipe bg-red" onclick="evaluarEmpatia(false, ${p.isEmpatia})">Simpatía / Inadecuado</button><button class="btn-swipe bg-green" onclick="evaluarEmpatia(true, ${p.isEmpatia})">Empatía / Adecuado</button></div>`;
    }
    function evaluarEmpatia(respuesta, correcta) {
      historialRespuestas.push({ pre: bancoJuego[ronda].text, res: respuesta?"Empatía":"Inadecuado", cor: correcta?"Empatía":"Inadecuado", exp: correcta ? "Validación y acompañamiento." : "Bloquea o minimiza la emoción." });
      if(respuesta === correcta) puntajeJuego++;
      ronda++; renderEmpatia();
    }

    // --- NUEVO 3: CAJAS DE CORRIENTES ---
    function startCorrientes() {
      historialRespuestas = []; juegoActual = 'corrientes'; ronda = 0; puntajeJuego = 0;
      let catsUtiles = dbCategorias.filter(c => c.nombre.length > 3).slice(0, 3);
      if(catsUtiles.length < 2) return alert("Faltan categorías en la base de datos.");

      renderCorrientes();

      let cajas = bancoJuego.cats.map(cat => `<div class="drop-box" onclick="evaluarCorriente(${cat.id}, ${c.categoriaId})">${cat.nombre}</div>`).join('');

      ronda++; renderCorrientes();

    function startAutores() { historialRespuestas = []; juegoActual = 'autores'; ronda = 0; puntajeJuego = 0; bancoJuego = mezclarArray(dbExtraAutores).slice(0, 4); renderAutores(); }

    }
    function renderCrucigrama() {
      let inputs = cruciObj.map((c, i) => `<div class="cross-row"><div class="cross-clue">${i+1}. ${c.res}</div><input type="text" class="cross-input" id="cruci_${i}" maxlength="${c.t.length}" placeholder="${c.t.length} letras" value="${c.val}"></div>`).join('');

    function checkCrucigrama() {
      puntajeJuego = 0; historialRespuestas = [];

          c.val = el.value.toUpperCase();

          else { el.style.borderColor = '#e74c3c'; }

      });
